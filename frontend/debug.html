<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstrCode Debug Workbench</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f7f1ea;
          color: #2f2923;
          font-family:
            Söhne, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
            Ubuntu, 'Helvetica Neue', Arial, sans-serif;
        "
      >
        <div
          style="
            width: min(560px, calc(100vw - 32px));
            border: 1px solid #e6dccd;
            border-radius: 24px;
            background: rgba(255, 253, 250, 0.96);
            box-shadow: 0 10px 30px rgba(117, 90, 52, 0.08);
            padding: 24px;
          "
        >
          <div
            style="
              font-size: 11px;
              font-weight: 600;
              letter-spacing: 0.12em;
              text-transform: uppercase;
              color: #aea293;
            "
          >
            Debug Only
          </div>
          <h1 style="margin: 8px 0 0; font-size: 24px">Debug Workbench</h1>
          <p style="margin: 12px 0 0; font-size: 14px; color: #7f7468; line-height: 1.7">
            正在加载调试工作台。如果停留太久，请查看 DevTools Console 或桌面端日志。
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/debug-main.tsx"></script>
  </body>
</html>
