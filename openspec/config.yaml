schema: my-workflow

context: |
  # 语言与文档规范
  - 所有文档、分析、设计说明、任务拆解、验收标准必须使用中文。
  - 术语应保持前后一致，优先使用项目既有命名；若引入新术语，必须先定义其含义与边界。
  - 文档应强调可执行性，避免空泛表述，优先给出明确约束、边界、输入输出与验收方式。
  - 本项目不需要向后兼容旧版本和api

  # 项目事实
  - 技术栈：
    - 后端：Rust、Axum、SSE
    - 桌面端：Tauri
    - 前端：TypeScript、React
    - 数据与持久化：JSONL 事件日志、会话存储
    - 系统特征：异步架构、流式响应、插件 / 工具系统

  # 架构权威来源
  - PROJECT_ARCHITECTURE.md 是架构约定的最高参考文档，必须持续保持更新。
  - 任何 proposal、specs、design、tasks 都必须与 PROJECT_ARCHITECTURE.md 保持一致。
  - 若本次变更与 PROJECT_ARCHITECTURE.md 存在冲突，必须显式指出冲突点，并说明：
    - 为什么冲突
    - 是否需要先更新 PROJECT_ARCHITECTURE.md
    - 本次方案如何过渡、迁移或回滚

  # 核心架构原则
  - 采用清晰分层、边界明确、依赖方向单向的架构设计。
  - Server is the truth：服务端是业务事实唯一来源。
  - 前后端分离：前端只消费 HTTP / SSE API，不承载核心业务逻辑。
  - DTO / 协议层必须保持纯数据结构，不承载运行时业务逻辑。
  - 存储、运行时、协议、界面适配层的职责必须清晰，避免边界漂移。
  - 所有设计优先提升系统可理解性与长期可维护性，而不是追求表面抽象层次。

  # 设计与实现原则
  - 优先复用现有模式与稳定边界，避免无必要地引入新抽象，但是鼓励在必要时进行合理抽象以提升整体设计质量。
  - 不为向后兼容牺牲整体设计质量；若保留兼容层，必须明确其生命周期与退出路径。
  - 重要改动必须说明：
    - 边界变化
    - 依赖变化
    - 职责重分配
    - 迁移方案
    - 回滚方案
  - 性能敏感路径应避免不必要抽象、重复序列化、重复数据转换与冗余状态同步。
  - 安全或高风险能力必须具备明确权限边界、默认保护与失败时的保守行为。
  - 任何跨模块设计都应说明数据流、控制流与错误传播路径。

  # 硬性约束
  - 会话持久化优先基于事件日志，而不是隐式内存状态。
  - 任何会话 / 子会话 / 子 agent 设计，必须明确：
    - 所有权
    - 生命周期
    - 通信方式
    - 恢复语义
    - 失败语义
  - 工具系统设计必须避免让 LLM 直接暴露于过多内部实现细节。
  - 流式场景必须考虑中断、取消、部分输出、重试与一致性问题。
  - 若涉及事件模型，必须说明事件定义、追加时机、回放行为、恢复策略与投影视图关系。

