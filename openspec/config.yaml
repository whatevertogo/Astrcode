schema: spec-driven # 默认 schema，推荐使用这个；也可以改成 minimalist 或自定义 schema

context: |
  必要:
    - 用中文写所有文档
   
  技术栈:
    - 后端: Rust, Axum, SSE
    - 桌面端: Tauri
    - 前端: TypeScript, React
    - 数据与持久化: JSONL 事件日志 / 会话存储
    - 其他: 异步架构、流式响应、插件/工具系统

  架构约定:
    - 采用清晰分层与边界明确的架构设计
    - Server is the truth：服务端作为业务事实唯一来源
    - 前后端分离，前端仅消费 HTTP / SSE API，不承载核心业务逻辑
    - DTO / 协议层保持纯数据结构，不混入运行时业务逻辑
    - PROJECT_ARCHITECTURE.md 是架构约定的主要文档，必须保持更新并作为所有设计决策的参考，这很重要你必须要深度理解并遵守其中的约定

  项目原则:
    - 优先干净架构与长期可维护性，不为向后兼容牺牲设计质量
    - 重要改动必须说明边界变化、依赖变化与职责重分配
    - 性能敏感路径应避免不必要抽象和重复数据转换
    - 安全或高风险能力应有明确权限边界与默认保护
    - 所有设计应优先帮助开发者理解系统，而不是只追求形式上的分层

  约束:
    - 会话持久化优先基于事件日志，而不是隐式内存状态
    - 子 agent / 子会话设计必须明确所有权、通信方式与恢复语义
    - 工具系统设计必须避免让 LLM 直接接触过多内部实现细节

rules:
  proposal:
    - 必须说明问题、目标、约束、取舍与最终方案
    - 必须说明用户可见影响与开发者可见影响
    - 明确列出 non-goals（本次不做的事）
    - 如果涉及替换旧结构，必须说明迁移与回滚思路

  specs:
    - 验收条件优先使用清晰、可验证的表达
    - 优先复用现有模式，不重复发明抽象
    - 必须包含边界情况、失败路径与流式场景考虑
    - 若涉及架构边界，必须体现模块职责与交互约束

  design:
    - 明确 crate 边界、依赖方向与核心数据流
    - 明确持久化方案、事件模型与回放/恢复机制
    - 如果涉及 server / runtime / storage / frontend，必须说明各自职责变化
    - 如果涉及协议或 DTO，必须保证其不承载业务逻辑
    - 若涉及会话、子 agent、工具调用，必须说明生命周期与所有权边界

  tasks:
    - 任务粒度保持小而可验证，每项尽量可独立实现与测试
    - 尽量包含准确文件路径
    - 包含必要的验证命令、测试要求或手动验收步骤
    - 优先按可独立交付的阶段拆分，而不是按技术层大块堆叠