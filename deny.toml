[graph]
exclude-dev = true

[bans]
multiple-versions = "allow"

deny = [
  { name = "tokio", wrappers = [
      "astrcode-core",
      "astrcode-example-plugin",
      "astrcode-plugin",
      "astrcode-runtime",
      "astrcode-server",
      "axum",
      "hyper",
      "hyper-rustls",
      "hyper-util",
      "reqwest",
      "tauri",
      "tauri-plugin-shell",
      "tokio-rustls",
      "tokio-util",
      "tower",
      "tower-http",
    ], reason = "tokio is allowed only in crates that own runtime, IO, or persisted session infrastructure; keep it out of protocol and sdk" },
  { name = "axum", wrappers = ["astrcode-server", "axum-extra"], reason = "axum belongs only in the server crate" },
]
