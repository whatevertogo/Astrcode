[graph]
exclude-dev = true

[advisories]
ignore = [
  # unic-* unmaintained — transitive via tauri → urlpattern, no upgrade available
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0057",
  # gtk-rs GTK3 bindings unmaintained — transitive via tauri (Linux), tauri 3 will migrate to GTK4
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  # proc-macro-error unmaintained — transitive via tauri chain
  "RUSTSEC-2024-0370",
  # fxhash unmaintained — transitive via tauri chain
  "RUSTSEC-2026-0049",
]

[bans]
multiple-versions = "allow"

deny = [
  { name = "tokio", wrappers = [
      "astrcode-cli",
      "astrcode-client",
      "astrcode-core",
      "astrcode-eval",
      "astrcode-adapter-llm",
      "astrcode-adapter-mcp",
      "astrcode-adapter-prompt",
      "astrcode-adapter-storage",
      "astrcode-agent-runtime",
      "astrcode-context-window",
      "astrcode-governance-contract",
      "astrcode-host-session",
      "astrcode-plugin-host",
      "astrcode-tool-contract",
      "astrcode-server",
      "axum",
      "hyper",
      "hyper-rustls",
      "hyper-util",
      "reqwest",
      "tauri",
      "tauri-plugin-shell",
      "tokio-rustls",
      "tokio-util",
      "tower",
      "tower-http",
    ], reason = "tokio is allowed only in crates that own runtime, IO, or persisted session infrastructure; keep it out of protocol and sdk" },
  { name = "axum", wrappers = ["astrcode-server", "axum-extra"], reason = "axum belongs only in the server crate" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "0BSD",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
]
private = { ignore = true }

[sources]
unknown-registry = "warn"
unknown-git = "warn"
