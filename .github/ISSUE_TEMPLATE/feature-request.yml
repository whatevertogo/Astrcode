name: 功能建议
description: 提交一个新能力或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 先描述真实场景，再描述你希望的方案
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明你希望的行为、交互或接口
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 可选方案
      description: 你是否考虑过其他做法，为什么不满意
  - type: textarea
    id: context
    attributes:
      label: 补充上下文
      description: 可以放截图、流程、参考项目或相关 issue
