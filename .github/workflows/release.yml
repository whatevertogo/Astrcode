name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 构建 Tauri 应用并发布
  release:
    name: Build and Release ${{ matrix.platform.os-name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os-name: Linux
            runs-on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os-name: macOS-Intel
            runs-on: macos-13
            target: x86_64-apple-darwin
          - os-name: macOS-Apple-Silicon
            runs-on: macos-14
            target: aarch64-apple-darwin
          - os-name: Windows
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Linux 特定依赖
      - name: Install Linux dependencies
        if: matrix.platform.os-name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AstrCode ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG](https://github.com/${{ github.repository }}/releases) for details.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.platform.target }}
