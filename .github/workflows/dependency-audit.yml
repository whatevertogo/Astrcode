name: Dependency Audit

on:
  push:
    branches: [master]
    paths:
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/actions/**'
  pull_request:
    branches: [master]
    paths:
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/actions/**'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "cargo-deny"

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny check bans
