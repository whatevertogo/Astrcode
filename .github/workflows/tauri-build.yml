name: Tauri Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  tauri-build:
    name: Tauri Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "tauri-build-${{ matrix.os }}"

      - name: Setup Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux-deps

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Export target triple
        shell: pwsh
        run: |
          "TAURI_ENV_TARGET_TRIPLE=${{ matrix.target }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prefetch Rust dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "cargo fetch attempt $attempt/$maxAttempts for $env:TAURI_ENV_TARGET_TRIPLE"
            cargo fetch --locked --target $env:TAURI_ENV_TARGET_TRIPLE
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq $maxAttempts) {
              exit $LASTEXITCODE
            }

            Start-Sleep -Seconds (10 * $attempt)
          }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ENV_TARGET_TRIPLE: ${{ env.TAURI_ENV_TARGET_TRIPLE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AstrCode ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
