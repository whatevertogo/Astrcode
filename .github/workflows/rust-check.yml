name: Rust Check

on:
  push:
    branches: [master]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/rust-check.yml'
      - '.github/actions/**'
  pull_request:
    branches: [master]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/rust-check.yml'
      - '.github/actions/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: "rustfmt, clippy"
          cache-key: "rust-check-ubuntu"

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Linux dependencies
        uses: ./.github/actions/setup-linux-deps

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify crates dependency graph
        run: node scripts/generate-crate-deps-graph.mjs --check

      - name: Check crate boundaries (soft mode)
        run: node scripts/check-crate-boundaries.mjs --soft

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "rust-check-${{ matrix.os }}"

      - name: Setup Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/setup-linux-deps

      - name: Run targeted regression
        run: node scripts/regressions.mjs

      - name: Run tests
        run: cargo test --workspace --exclude astrcode
