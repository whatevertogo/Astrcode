[package]
name = "astrcode-runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true

[package.metadata.runtime_boundary]
owner = "runtime-facade"
public_surface = ["sessions", "execution", "tools"]
assembles = [
	"astrcode-runtime-session",
	"astrcode-runtime-execution",
	"astrcode-runtime-agent-control",
	"astrcode-runtime-agent-loop",
	"astrcode-runtime-agent-loader"
]

[dependencies]
astrcode-runtime-session = { path = "../runtime-session" }
astrcode-runtime-execution = { path = "../runtime-execution" }
astrcode-runtime-agent-control = { path = "../runtime-agent-control" }
astrcode-runtime-agent-loop = { path = "../runtime-agent-loop" }
astrcode-core = { path = "../core" }
astrcode-plugin = { path = "../plugin" }
astrcode-protocol = { path = "../protocol" }
astrcode-runtime-tool-loader = { path = "../runtime-tool-loader" }
astrcode-storage = { path = "../storage" }
astrcode-runtime-config = { path = "../runtime-config" }
astrcode-runtime-llm = { path = "../runtime-llm" }
astrcode-runtime-prompt = { path = "../runtime-prompt" }
astrcode-runtime-skill-loader = { path = "../runtime-skill-loader" }
astrcode-runtime-agent-loader = { path = "../runtime-agent-loader" }
astrcode-runtime-agent-tool = { path = "../runtime-agent-tool" }
astrcode-runtime-registry = { path = "../runtime-registry" }
anyhow.workspace = true
async-trait.workspace = true
chrono.workspace = true
dashmap.workspace = true
dirs.workspace = true
futures-util.workspace = true
log.workspace = true
notify.workspace = true
regex.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
uuid.workspace = true

[dev-dependencies]
astrcode-core = { path = "../core", features = ["test-support"] }
astrcode-runtime-registry = { path = "../runtime-registry" }
tempfile.workspace = true
