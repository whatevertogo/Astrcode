name = "repo-inspector"
version = "0.1.0"
description = "Example coding plugin that summarizes the active workspace and previews files."
plugin_type = ["Tool"]
executable = "cargo"
args = ["run", "-p", "astrcode-example-plugin", "--quiet"]
working_dir = "../../.."
repository = "https://github.com/whatevertogo/astrcode"

[[capabilities]]
name = "workspace.summary"
kind = "tool"
description = "Summarize the active coding workspace."
input_schema = { type = "object", properties = {} }
output_schema = { type = "object" }
streaming = false
profiles = ["coding"]
tags = ["example", "workspace"]
permissions = []
side_effect = "none"
stability = "stable"

[[capabilities]]
name = "file.preview"
kind = "tool"
description = "Preview a file that lives inside the active workspace."
input_schema = { type = "object", properties = { path = { type = "string" }, maxLines = { type = "integer" } } }
output_schema = { type = "object" }
streaming = false
profiles = ["coding"]
tags = ["example", "file"]
permissions = []
side_effect = "none"
stability = "stable"
